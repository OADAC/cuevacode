<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8814a"/>
      <stop offset="55%" stop-color="#8a6d3b"/>
      <stop offset="100%" stop-color="#5d4a28"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.30" stroke="#ffffff" stroke-width="1" fill="none">
    <line x1="64" y1="128" x2="448" y2="128"/>
    <line x1="64" y1="192" x2="448" y2="192"/>
    <line x1="64" y1="256" x2="448" y2="256"/>
    <line x1="64" y1="320" x2="448" y2="320"/>
    <line x1="64" y1="384" x2="448" y2="384"/>
    <line x1="128" y1="64" x2="128" y2="448"/>
    <line x1="192" y1="64" x2="192" y2="448"/>
    <line x1="256" y1="64" x2="256" y2="448"/>
    <line x1="320" y1="64" x2="320" y2="448"/>
    <line x1="384" y1="64" x2="384" y2="448"/>
  </g>

  <!-- Decomposed shape: 3 J-blocks of different sizes -->
  <!-- J6 block (3x2) -->
  <rect x="96"  y="160" width="192" height="128" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-width="3"/>
  <text x="192" y="232" text-anchor="middle" font-family="Inter,Helvetica,Arial,sans-serif" font-weight="800" font-size="40" fill="#ffffff" letter-spacing="-1">J6</text>
  <text x="192" y="262" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-weight="500" font-size="14" fill="#ffffff" fill-opacity="0.75">3×2</text>

  <!-- J4 block (2x2) -->
  <rect x="320" y="160" width="128" height="128" rx="8" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-width="3"/>
  <text x="384" y="232" text-anchor="middle" font-family="Inter,Helvetica,Arial,sans-serif" font-weight="800" font-size="36" fill="#ffffff">J4</text>
  <text x="384" y="258" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#ffffff" fill-opacity="0.75">2×2</text>

  <!-- J2 block (2x1) -->
  <rect x="96"  y="320" width="128" height="64" rx="6" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-width="3"/>
  <text x="160" y="358" text-anchor="middle" font-family="Inter,Helvetica,Arial,sans-serif" font-weight="800" font-size="26" fill="#ffffff">J2</text>

  <!-- J1 + Special edge piece -->
  <rect x="256" y="320" width="64" height="64" rx="5" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-width="2"/>
  <text x="288" y="360" text-anchor="middle" font-family="Inter,Helvetica,Arial,sans-serif" font-weight="800" font-size="20" fill="#ffffff">J1</text>

  <!-- Special clipped piece (triangle clip) -->
  <path d="M352 320 L416 320 L416 384 Z" fill="#ffffff" fill-opacity="0.20" stroke="#ffffff" stroke-width="2"/>
  <text x="396" y="368" text-anchor="middle" font-family="Inter,Helvetica,Arial,sans-serif" font-weight="800" font-size="14" fill="#ffffff">★</text>

  <!-- Brand mark — diamond -->
  <g transform="translate(256 100)">
    <path d="M0 -28 L28 0 L0 28 L-28 0 Z" fill="#ffffff" stroke="#000000" stroke-opacity="0.15" stroke-width="1"/>
    <path d="M0 -16 L16 0 L0 16 L-16 0 Z" fill="#8a6d3b"/>
  </g>

  <!-- Wordmark -->
  <text x="256" y="442" text-anchor="middle" font-family="Inter,Helvetica,Arial,sans-serif" font-weight="800" font-size="22" fill="#ffffff" letter-spacing="3">CUEVA</text>
</svg>
